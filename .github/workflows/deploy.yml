name: Deploy Angular PWA to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Recomendada para Angular 21
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # IMPORTANTE: Cambia 'nombre-de-tu-repo' por el nombre exacto en GitHub
        run: npx ng build --configuration production --base-href /MatferlineAppWeb/

      - name: Fix for GitHub Pages routing
        run: cp dist/matferline/browser/index.html dist/matferline/browser/404.html

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/matferline/browser # Verifica esta ruta en tu carpeta dist local
          branch: gh-pages

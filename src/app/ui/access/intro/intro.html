<section id="section_intro" class="pantallasAcceso">

    <div (click)="searchBuscador()" class="intro_buscador">
        <mat-icon matPrefix>search</mat-icon>
        <span>Busca tu autoescuela</span>
    </div>

    <div class="intro_info">
        <img src="./svg/logo_matferline.svg" alt="matferline">

        <img src="./svg/image_buscador.svg" alt="buscador">

        <div>
            <p>
                <img src="./svg/image_ico_info.svg" alt="info">
                <span>Escribe el nombre de tu autoescuela o busca por provincia.</span>
            </p>
            <p>
                <button (click)="searchProvincias()" mat-flat-button type="button">
                    <mat-icon>room</mat-icon>
                    Busca en tu provincia
                </button>
            </p>
        </div>
    </div>

    <p class="p_matfer">&copy; EDICIONES MATFER S.L. {{stateService.annoDomine}}</p>

</section>

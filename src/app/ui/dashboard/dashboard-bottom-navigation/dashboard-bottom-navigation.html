<section id="section_bottom_navigation">

    <ul>
        @for(servicio of serviciosDisponibles(); track $index) {
        <li (click)="(servicioSeleccionado() !== $index) && gotoServicio(servicio, $index)" [ngClass]="(servicioSeleccionado() === $index) ? 'servicio_activo' : ''">
            <img [src]="(servicioSeleccionado() === $index) ? ('svg/' + listaIconos[$index]) : ('svg/off_' + listaIconos[$index])" alt="icon">
            <span [ngStyle]="{color: (servicioSeleccionado() === $index) ? '#a90094' : '#707070'}">{{servicio}}</span>
        </li>
        }
    </ul>

</section>

<section id="section_cabecera_permiso">

    <div class="cabecera_permiso" [ngStyle]="{background: colorSet()[2]}">
        <img [src]="icono()" #iconoPermiso (load)="iconoPermiso.style.opacity = '1'" alt="permiso">
        <div>
            <p [innerHTML]="nombrepermiso()" [ngStyle]="{color: colorSet()[0]}"></p>
            <p [innerHTML]="nombrecurso()"></p>
        </div>
    </div>

    <div class="cabecera_permiso_idioma_estadistica">
        <ul>
            <li>&nbsp;</li>
            <li>
                @if(idiomaExists()) {
                <app-boton-idioma
                    [bandera]="idioma()?.bandera ?? ''"
                    [defecto]="idioma()?.defecto ?? 0"
                    (setIdiomaSelectedEmitter)="clickIdioma($event)" />
                }
            </li>
            <li>
                <img (click)="clickEstadisticas()" src="svg/icon_estadistica.svg" alt="estadistica">
            </li>
        </ul>
    </div>

</section>

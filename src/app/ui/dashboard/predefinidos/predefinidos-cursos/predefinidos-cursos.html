<section id="section_predefinidos_cursos">

    <app-dashboard-app-bar [titulo]="'Test Predefinidos'" [nivel]=0 />

    <div>
        @for(predefinido of predefinidos; track predefinido.cdi; let indexCurso = $index) {
            <div>
                <app-cabecera-curso [index]="$index" [curso]="predefinido.nombre" [show]="showState()[$index]" (showPermisosEmitter)="showPermisos($index)" />

                <div class="panel-content-wrapper" [class.is-open]="showState()[$index]">
                    <div class="panel-content">
                        <div class="inner-content">
                            @for(permiso of predefinido.permisos; track permiso.cdi) {
                                <div class="item_permiso_curso">
                                    <app-item-permiso-curso
                                        [cdi]="permiso.cdi.toString()"
                                        [nombre]="permiso.nombre"
                                        [icono]="permiso.icono"
                                        [numeroCategorias]="permiso.categorias.length"
                                        (clickPermisoEmitter)="gotoPermiso(indexCurso, predefinido.cdi.toString(), $event)" />
                                </div>
                            }
                        </div>
                    </div>
                </div>
            </div>
        }
    </div>

</section>

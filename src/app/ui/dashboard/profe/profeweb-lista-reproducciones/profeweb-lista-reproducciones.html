@defer (when listaReproducciones.length > 0) {
<section id="section_profeweb_reproducciones">

    <app-dashboard-app-bar [titulo]="'Profeweb'" [nivel]=1 (goBackEmitter)="navigateBack()" />

    <app-profeweb-repro-cabecera
        [nombreProfe]="nombreProfe"
        [nombreProfeweb]="nombreProfeweb"
        [indexCurso]="indexCurso"
        [index]="index" />

    <app-profeweb-repro-titulo />

    <app-profeweb-repro-cabecera-lista
        [iconoCategoria]="icono"
        [nombreCategoria]="nombreCategoria"
        [numeroReproducciones]="listaReproducciones.length"
        (showListaEmitter)="setShowListaReproducciones($event)" />

    <div>
        <app-profeweb-repro-lista
            [listaReproducciones]="listaReproducciones"
            [show]="showListaReproducciones()" />
    </div>

</section>
}

<section id="section_profeweb_categorias">

    <app-dashboard-app-bar [titulo]="'Profeweb'" [nivel]=1 (goBackEmitter)="navigateBack()" />

    <app-cabecera-profe
        [indexCurso]="indexCurso()"
        [index]="index()"
        [profewebcdi]="profewebcdi()"
        [profecdi]="profecdi()"
        (clickIdiomaEmitter)="setIidiomaSelected($event)" />

    <div>
        @for(categoria of profeweb?.categorias; track categoria.cdi) {
        <div class="item_categoria">
            <app-item-categoria-profe
                [cdi]="categoria.cdi"
                [nombre]="categoria.nombre"
                [icono]="(categoria.icono.length > 0) ? categoria.icono : (profeweb?.logotipo ?? '')"
                [numeroTemas]="categoria.temas.length"
                [show]="showState()[$index]"
                (showTestEmitter)="showProfeCategoria($index)" />

            <div class="panel-content-wrapper" [class.is-open]="showState()[$index]">
                <div class="panel-content">
                    <div class="inner-content contenedor_lista_test">

                        <ul>
                            <li>
                                <img (click)="navigateEstadisticas(categoria.cdi, categoria.nombre, categoria.icono)" src="svg/icon_lista_reproducciones.svg" alt="reproducciones">
                            </li>
                            <li>
                                <app-boton-examen-estudio [buttonEnabled]="true" (onClickEmitter)="setAutocorreccionCategoria($index, $event)" />
                            </li>
                        </ul>

                        @for(tema of categoria.temas; track tema.cdi) {
                        <div class="item_test">
                            <app-item-lista-profe-tema
                                [tema]="tema"
                                (clickTemaEmitter)="getTemaProfe($index)" />
                        </div>
                        }

                    </div>
                </div>
            </div>
        </div>
        }
    </div>

</section>

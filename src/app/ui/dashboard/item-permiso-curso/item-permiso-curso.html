<section (click)="clickPermiso()" id="section_item_permiso_curso">

    <img [src]="icono()" #iconoPermiso (load)="iconoPermiso.style.opacity = '1'" alt="icono permiso">

    <div>
        <p [innerHTML]="nombre()"></p>
        @if(numeroCategorias() > 0) {<span>{{ numeroCategorias() }} categor&iacute;as</span>}
    </div>

    <mat-icon>keyboard_arrow_right</mat-icon>

</section>

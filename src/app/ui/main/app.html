<section id="section_app">

  <!-- APP MAIN BLOCK -->
  <div class="router_app">
    <router-outlet></router-outlet>
  </div>

  <!-- OFFLINE -->
  @if(offline()) { <app-connection-error /> }

  <!-- LANDSCAPE SCREEN -->
  @if(deviceOrientation() === 'landscape') { <app-horizontal-screen /> }

  <!-- LOADING SPINNER -->
  @if(loading()) { <app-spinner-loading /> }

  <!-- INSTALLATION -->
  <!-- TODO: @if(!isInstalled()) { <app-installation /> } -->
  @if(!isInstalled()) { <app-installation (installPWAEmitter)="installPWA()" /> }

</section>

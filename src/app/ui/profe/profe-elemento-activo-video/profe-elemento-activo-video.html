<section [class.is-fullscreen]="fullscreen()" [id]="fullscreen() ? 'section_profe_elemento_activo_video_fullscreen' : 'section_profe_elemento_activo_video'">

    <div class="video-wrapper">
        <div #playerContainer></div>
    </div>

    @if (deviceSystem() === DeviceSystem.Android) {
        <button (click)="fullscreen.set(!fullscreen())" mat-icon-button type="button">
            <mat-icon>{{ fullscreen() ? 'fullscreen_exit' : 'fullscreen' }}</mat-icon>
        </button>
    }

    @if (deviceSystem() === DeviceSystem.iOS) {
        <img (click)="openYoutube()" class="boton_youtube" src="./svg/icon_youtube.svg" alt="youtube">
    }

</section>

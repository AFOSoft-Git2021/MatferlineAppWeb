<section id="section_installation" class="pantallasAcceso">

    <span></span>

    <div class="info">
        <img src="./svg/logo_matferline.svg" alt="matferline">

        @if (deviceSystem() === 'android') {
            <div class="bloque_android">
                <img src="./svg/icon_install_pwa.svg" alt="loading">
                <h2>Para comenzar instala la aplicación</h2>
                <button (click)="installPWA()" mat-flat-button type="button">
                    <mat-icon>install_mobile</mat-icon>
                    Instalar app
                </button>
            </div>
        }
        @else {
            <div class="bloque_ios">
                <img src="./svg/icon_install_pwa.svg" alt="loading">
            </div>
        }

    </div>

    <p class="p_matfer">&copy; EDICIONES MATFER S.L. {{stateService.annoDomine}}</p>

</section>
